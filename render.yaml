services:
  - type: web
    name: proscout-ai
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
    disk:
      name: proscout-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
